
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Circular</title>
    <style>
        :root {
            --cor-principal: #ff4757;
            --cor-fundo: rgba(15, 15, 15, 0.95);
            --borda: 2px solid #ff4757;
        }

        body {
            background-color: #1e1e2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* O Painel em formato de bola */
        .painel-bola {
            width: 300px;
            height: 300px;
            background: var(--cor-fundo);
            border: var(--borda);
            border-radius: 50%; /* Faz o formato de bola */
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .painel-bola h2 {
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--cor-principal);
        }

        /* Lista de opções dentro da bola */
        .opcoes {
            list-style: none;
            padding: 0;
            width: 100%;
        }

        .item-opcao {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        /* Estilização dos Switches (Botões de ligar/desligar) */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--cor-principal); }
        input:checked + .slider:before { transform: translateX(14px); }

    </style>
</head>
<body>

    <div class="painel-bola">
        <h2>Painel Menu</h2>
        <div class="opcoes">
            <div class="item-opcao">
                <span>Aimbot</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="item-opcao">
                <span>ESP Line</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="item-opcao">
                <span>Speed</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <p style="font-size: 0.7rem; margin-top: 10px; opacity: 0.6;">v1.0.2 Stable</p>
    </div>

</body>
</html>
